<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configuração</title>

    <link rel="stylesheet" href="/src/styles/temas.css" />
    <link rel="stylesheet" href="/src/styles/header.css" />
    <link rel="stylesheet" href="/src/styles/configuração.css" />
  </head>
  <body class="dark">
    <header id="header"></header>
    <main>
      <h1>Configurações</h1>

      <h2>Tutorial</h2>

      <a href="/src/pages/tutorial.html"><img id="img-lupa" src="/src/images/lupa.png" /></a>

      <div class="div-temas">
        <h3>Temas</h3>
        <select id="inputListaTemas" name="inputTema">
          <option value="light">light</option>
          <option value="bluelight">blue light</option>
          <option value="emeraldlight">emerald light</option>
          <option value="teallight">teal light</option>
          <option value="violetlight">violet light</option>
          <option value="dark"selected>dark</option>
          <option value="bluedark">blue dark</option>
          <option value="emeralddark">emerald dark</option>
          <option value="tealdark">teal dark</option>
          <option value="violetdark">violet dark</option>

        </select>
      </div>
      <button id="btnLogout">Sair da conta</button>
    </main>

    <script>
      const inputListaTemas = document.getElementById("inputListaTemas");
      inputListaTemas.addEventListener("change", (event) => {
        const novoTema = event.target.value;

        localStorage.setItem("Tema", novoTema);

        document.body.className = novoTema;
      });

      document.getElementById("btnLogout").onclick = () => {
        localStorage.removeItem("ID");
        window.location.replace("login.html");
      };
    </script>

    <script src="../scripts/services/header.js"></script>
  </body>
</html>

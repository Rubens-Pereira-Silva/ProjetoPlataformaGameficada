<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atividades</title>

    <link rel="stylesheet" href="/src/styles/temas.css" />
    <link rel="stylesheet" href="../styles/atividades.css" />
  </head>
  <body class="dark">
    <header>
      <button onclick="" id="btnConfig">
        <img src="../images/configuracao.svg" alt="" />
      </button>
    </header>

    <main>
      <section id="atividades"></section>
      <dialog id="teoriaDialog">
        <button class="btn-fecharModal" onclick="btnfecharModal()">X</button>
        <h3 id="teoriaModalTitulo"></h3>
        <p id="teoriaModalParagrafo">
          teoria mais teoria com teorias teoricas teorizadas
        </p>
        <div class="modal-btns">
          <button onclick="mudarPaginaTeoria(1)"><- Anterior</button>
          <button onclick="mudarPaginaTeoria(2)">Próximo -></button>
        </div>
      </dialog>

      <dialog id="DesafioDialog">
        <button class="btn-fecharModal" onclick="btnfecharModal()">X</button>
        <h3 id="DesafioModalTitulo"></h3>
        <p id="DesafioModalPerfunta">Desafios</p>
      </dialog>

      <dialog id="configDialog">
        <select id="lista-temas" name="inputTema"></select>
        <button id="btnLogout">Sair</button>
        <button id="btnFecharConfig">X</button>
      </dialog>
    </main>

    <script src="../scripts/services/api.js"></script>
    <script src="../scripts/services/header.js"></script>
    <script src="../scripts/atividades.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link rel="stylesheet" href="/src/styles/temas.css" />
    <link rel="stylesheet" href="/src/styles/login.css" />
  </head>
  <body class="roxo">
    <div class="theme">
      <label class="switch">
        <button onclick="trocarTema()">Trocar tema</button>
        <span class="slider"></span>
      </label>
    </div>

    <div class="login-box">
      <h1 id="titulo">Login</h1>

      <form id="login-form">
        <input type="email" placeholder="E-mail" id="login-email-input" required/>
        <input type="password" placeholder="Senha" id="login-senha-input" required/>
        <button type="submit" id="login-button">Entrar</button>
      </form>

      <form id="create-form" style="display: none">
        <input type="text" placeholder="Nome" id="create-nome-input" required />
        <input type="email" placeholder="E-mail" id="create-email-input" required/>
        <input type="password" placeholder="Senha" id="create-senha-input1" required/>
        <input type="password" placeholder="Senha" id="create-senha-input2" required/>
        <button type="submit" id="create-button">Criar conta</button>
      </form>

      <button id="btn-trocarTela" onclick="trocarTela()">Criar conta</button>
      
    </div>
  </body>
  <script src="/src/scripts/services/login.js"></script>
</html>

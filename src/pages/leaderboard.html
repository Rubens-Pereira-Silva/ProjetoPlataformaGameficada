<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard</title>

    <link rel="stylesheet" href="/src/styles/temas.css" />
    <link rel="stylesheet" href="/src/styles/header.css" />
    <link rel="stylesheet" href="/src/styles/leaderboard.css" />
  </head>
  <body class="dark">
    <header id="header"></header>
    <script src="../scripts/services/header.js"></script>
    <main>
      <h1>Top 10 Jogadores</h1>
      <ol id="listaJogadores"></ol>
    </main>
    <script>
      async function init() {
        const res = await fetch(
          "https://projetoplataformaunip-api-1.onrender.com/usuario/top"
        );
        const data = await res.json();

        console.log(data);
        document.getElementById("listaJogadores").innerHTML = ``;

        data.forEach((jogador) => {
          document.getElementById(
            "listaJogadores"
          ).innerHTML += `<li><img src="../images/iconsJogador/${jogador.icon}.png"><p>${jogador.nome}</p>  <p>${jogador.moedas}</p></li>`;
        });
      }
      init();
    </script>
  </body>
</html>
